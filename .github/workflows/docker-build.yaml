#------------------------
# PIPELINE NAME
#------------------------
name: Docker Build, Scan and Push

#------------------------
# TRIGGERS
#------------------------

# Workflow runs when:
    # 1. A code is pushed to the repo main branch
    # 2. Manually triggered from the GitHub UI

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - ".github/workflows"
            - "**/*.md"

#------------------------------
# GLOBAL ENVIRONMENT VARIABLES
#------------------------------
env:
    DOCKER_REPO: dolamu
    DOCKER_IMAGE: devopsbootcamp-linker-backend
    NEXT_PUBLIC_BACKEND_URL: "https://localhost:3001"
    DOCKER_TAG: latest

#-------------------------------------------
# JOBS 1. Notify Slack that pipeline started
#-------------------------------------------
jobs:
    slack-notify:
        runs-on: ubuntu-latest
        steps:
            - name: Slack Notification
              uses: rtCamp/action-slack-notify@v2
              env:
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_TITLE: "Docker Build Pipeline Triggered"
                SLACK MESSAGE: |
                    **Event:** ${{ github.event_name }}

                    **Actor:** ${{ github.actor }}

                    **Branch:** ${{ github.ref_name }}

                    **Commit:** ${{ github.event.head_commit.message }}


#-----------------------------------------
# JOB 2. Build, Scan and Push Docker Image
#-----------------------------------------
    build-scan-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout application repository
              uses: actions/checkout@v4

            - name: Set up Docker
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ env.DOCKER_REPO }}
                password: ${{ secrets.DOCKER_TOKEN }}
              
            - name: Generate Docker image tag
              id: tag
              uses: docker/metadata-action@v5
              with:
                images: docker.io/${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE }}
                tags: |
                    type=sha, format=short
            
            - name: Build and push Docker image
              uses: docker/build-push-action@v4
              with:
                context: .
                load: true
                tags: ${{ steps.tag.outputs.tags }}

            - name: Install Trivy
              run: |
                curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sudo sh -s -- -b /usr/local/bin

            - name: Scan Docker Images for Vulnerabilities
              run: |
                 trivy image \
                    --format table \
                    --exit-code 1 \
                    --ignore-unfixed \
                    --severity CRITICAL,HIGH \
                    "${{ steps.tag.outputs.tags }}" \
                    | tee trivy-report.txt


            - name: Upload Trivy Report
              if: always() # Ensure this step runs even if the previous step fails
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-report-linker-backend
                  path: trivy-report.txt

            
            - name: Push Image to Docker Hub
              uses: docker/build-push-action@v4
              with:
                 context: .
                 push: true
                 tags: ${{ steps.tag.outputs.tags}}


            - name: Slack Notification on Success or Failure
              if: always() # Ensure this step runs regardless of previous step outcomes
              uses: rtCamp/action-slack-notify@v2
              env:
                SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                SLACK_COLOR: ${{ job.status }}
                SLACK_MESSAGE: |
                    Docker pipeline **${{ job.status }}**
                    Actor: ${{ github.actor }}
                    Repository: ${{ github.repository}}
                    Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}